plugin:
  - id: "@textlint/textlint-plugin-text"
  - id: "@textlint/textlint-plugin-markdown"
filters:
  comments: true
rules:
  spelling:
    language: "en"
    skipPatterns:
      - "TUF" # The Update Framework
      - "Codecov" # Code coverage tool
      - "SLSA" # Supply Chain Levels for Software Artifacts
      - "/[Cc]odebase/"

      # Terminology
      - "/\\bCodecov\\b/" # Code coverage service
      - "/\\bESM\\b/" # ECMAScript Modules

      - "/\\bAMD64\\b/g"
      - "/\\bARM64\\b/g"
      - "/\\b(CHANGELOG|Changelog)\\b/g"
      - "/\\bCODEOWNER\\b/g"
      - "/\\bCLA\\b/g"
      - "/\\bCLI\\b/g"
      - "/\\bCVSS\\b/g"
      - "/\\bDCO\\b/g"
      - "/\\bOSS\\b/g"
      - "/\\bPRs?\\b/g"
      - "/\\bUI\\b/g"
      - "/\\bYAML\\b/g"
      - "/\\bCodeQL\\b/g"
      - "/\\bDependabot\\b/g"
      - "/\\bHomebrew\\b/g"
      - "/\\bJavaScript\\b/g"
      - "/\\bMakefile\\b/g"
      - "/\\bNode.js\\b/g"
      - "/\\bOpenSSF\\b/g"
      - "/\\bTODOs?\\b/g"
      - "/\\bautofix\\.ci\\b/g"
      - "/\\baarch64\\b/g"
      - "/\\be2e\\b/g"
      - "/\\bmacOS\\b/g"
      - "/\\bx86-64\\b/g"
      - "/\\b[Aa]llowlists?\\b/g"
      - "/\\b[Cc]hecksums?\\b/g"
      - "/\\b[Cc]odebases?\\b/g"
      - "/\\b[Ff]ormatters?\\b/g"
      - "/\\b[Ll]inters?\\b/g"
      - "/\\b[Ll]ockfiles?\\b/g"
      - "/\\b[Pp]ositivity\\b/g"
      - "/\\b[Pp]re\\b/g"
      - "/\\b[Rr]ebase\\b/g"
      - "/\\b[Rr]eproducibility\\b/g"
      - "/\\b[Rr]ulesets?\\b/g"
      - "/\\b[Rr]untimes?\\b/g"
      - "/\\b[Ss]andbox(ed)?\\b/g"
      - "/\\b[Ss]exualized\\b/g"
      - "/\\b[Ss]ocio-economic\\b/g"
      - "/\\b[Uu]serspace\\b/g"
      - "/\\b[Vv]endored\\b/g"
      - "/\\b[Vv]irtualenv\\b/g"
      - "/\\bv?[0-9]+\\b/g"
      - ":white_check_mark:"
